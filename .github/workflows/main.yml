name: OrangeFox Sync Lean

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 2048
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: Install Repo
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Sync
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          mkdir -p "$GITHUB_WORKSPACE/OF"
          cd "$GITHUB_WORKSPACE/OF"
          
          git clone https://gitlab.com/OrangeFox/sync.git sync --depth=1
          cd sync

          sed -i 's/repo sync;/repo sync -c --no-clone-bundle --no-tags -j$(nproc);/' ./orangefox_sync.sh
          sed -i 's/git clone /&--depth=1 /' ./orangefox_sync.sh
          
          export LC_ALL=C
          ./orangefox_sync.sh --branch 12.1 --path "$GITHUB_WORKSPACE/OF/fox_12.1"

      - name: Cleanup and Compress
        run: |
          rm -rf "$GITHUB_WORKSPACE/OF/fox_12.1/.repo"
          tar -czf "$GITHUB_WORKSPACE/OrangeFox-12.1-Sources.tar.gz" -C "$GITHUB_WORKSPACE/OF" fox_12.1

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OrangeFox-12.1-Sources
          path: OrangeFox-12.1-Sources.tar.gz
