name: OrangeFox Sync Lean

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 2048
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: Install minimal dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2

      - name: Install Repo
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Sync
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          mkdir -p "$GITHUB_WORKSPACE/OF"
          cd "$GITHUB_WORKSPACE/OF"
          
          git clone https://gitlab.com/OrangeFox/sync.git sync --depth=1
          cd sync
          
          export LC_ALL=C
          ./orangefox_sync.sh --branch 14.1 --path "$GITHUB_WORKSPACE/OF/fox_14.1" --depth=1

      - name: Cleanup and Compress
        run: |
          rm -rf "$GITHUB_WORKSPACE/OF/fox_14.1/.repo"
          tar -czf "$GITHUB_WORKSPACE/OrangeFox-14.1-Sources.tar.gz" -C "$GITHUB_WORKSPACE/OF" fox_14.1

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OrangeFox-14.1-Sources
          path: OrangeFox-14.1-Sources.tar.gz
          retention-days: 1
